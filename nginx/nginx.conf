# repo-frontend/nginx/nginx.conf

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Health endpoint
    location /health {
        default_type application/json;
        return 200 '{"status":"ok","service":"frontend"}';
    }

    # Serve static files
    location / {
        try_files $uri $uri/ /index.html;
    }
}
