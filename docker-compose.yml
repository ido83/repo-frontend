# repo-frontend/docker-compose.yml
# Runnable demo: nginx serves a static HTML page.
# No database needed — only shared networking and observability from infra-base.
#
# Try it:
#   docker compose up
#   open http://localhost:3001

include:
  - path: ../infra-base/compose/base-networking.yml
  - path: ../infra-base/compose/base-observability.yml

services:
  frontend:
    extends:
      file: ../infra-base/compose/base-app.yml
      service: app-base
    image: nginx:1.25-alpine
    ports:
      - "${FRONTEND_PORT:-3001}:80"
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/templates/default.conf.template:ro
    environment:
      APP_NAME: frontend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    env_file:
      - ../infra-base/env/.env.base
      - ../infra-base/env/.env.networking
